<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mentor Profile - MentU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow-sm h-20 flex items-center justify-between px-8 sticky top-0 z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-10 h-10 bg-[#1e3a8a] flex items-center justify-center rounded">
                <i class="fas fa-graduation-cap text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-[#1e3a8a]">MentU</h1>
        </div>
        <button onclick="history.back()" class="text-[#1e3a8a] font-bold text-sm">← QUAY LẠI</button>
    </header>

    <main class="max-w-4xl mx-auto py-12 px-4">
        <div id="profile-content" class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <p class="p-20 text-center text-gray-400 italic">Đang tải hồ sơ từ database...</p>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGk1ElxXExiYyrzQzQ_wqLobafBs__muk",
            authDomain: "mentor-web-add47.firebaseapp.com",
            databaseURL: "https://mentor-web-add47-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mentor-web-add47",
            storageBucket: "mentor-web-add47.firebasestorage.app",
            messagingSenderId: "595535263471",
            appId: "1:595535263471:web:0d703f288f552421254d1a",
            measurementId: "G-90SRNQD7GD"
        };

        firebase.initializeApp(firebaseConfig);

        firebase.auth().signInAnonymously().catch(err => {
            console.error('Firebase auth error:', err);
            document.getElementById('profile-content').innerHTML = `<p class="p-20 text-center text-red-500">Không thể kết nối Firebase.</p>`;
        });

        function fetchProfile() {
            const params = new URLSearchParams(window.location.search);
            const mentorId = params.get('id'); // Lấy ID từ thanh địa chỉ

            if (!mentorId) {
                document.getElementById('profile-content').innerHTML = `<p class="p-20 text-center text-red-500">ID mentor không hợp lệ.</p>`;
                return;
            }

            const mentorRef = firebase.database().ref(`mentors/${mentorId}`);
            mentorRef.get().then(snapshot => {
                const mentor = snapshot.exists() ? snapshot.val() : null;

                if (mentor) {
                    document.getElementById('profile-content').innerHTML = `
                        <div class="relative overflow-hidden rounded-[32px] shadow-2xl border border-slate-200 bg-white">
                            <div class="h-52 bg-gradient-to-r from-slate-950 via-blue-950 to-sky-700"></div>
                            <div class="px-8 pb-10 -mt-28 relative">
                                <div class="flex flex-col lg:flex-row items-center gap-8">
                                    <div class="relative w-40 h-40 rounded-full overflow-hidden border-4 border-white bg-white shadow-xl">
                                        <img src="${mentor.avatar}" alt="${mentor.name}" class="w-full h-full object-cover">
                                    </div>
                                    <div class="text-center lg:text-left max-w-2xl">
                                        <span class="inline-block rounded-full bg-white/10 px-4 py-1 text-xs uppercase tracking-[0.35em] text-slate-100 shadow-sm backdrop-blur-sm">Mentor</span>
                                        <h1 class="mt-4 text-5xl font-extrabold text-white tracking-tight">${mentor.name}</h1>
                                        <p class="mt-3 text-lg text-black">${mentor.role}${mentor.khoa ? ` @ ${mentor.khoa}` : ''}</p>
                                    </div>
                                </div>

                                <div class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-4 text-sm text-slate-900">
                                    <div class="rounded-[24px] bg-white p-4 shadow-sm border border-slate-200">
                                        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mb-2">MSSV</p>
                                        <p class="font-semibold text-slate-900">${mentor.mssv || 'Chưa cập nhật'}</p>
                                    </div>
                                    <div class="rounded-[24px] bg-white p-4 shadow-sm border border-slate-200">
                                        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mb-2">Khoa</p>
                                        <p class="font-semibold text-slate-900">${mentor.khoa || 'Chưa chọn'}</p>
                                    </div>
                                    <div class="rounded-[24px] bg-white p-4 shadow-sm border border-slate-200">
                                        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mb-2">Ngôn ngữ</p>
                                        <p class="font-semibold text-slate-900">${mentor.lang || 'Chưa cập nhật'}</p>
                                    </div>
                                    <div class="rounded-[24px] bg-white p-4 shadow-sm border border-slate-200">
                                        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mb-2">Email</p>
                                        <p class="font-semibold text-slate-900">${mentor.email || 'Chưa cập nhật'}</p>
                                    </div>
                                </div>

                                <div class="mt-10 grid gap-6 lg:grid-cols-2">
                                    <div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
                                        <h2 class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-700 mb-4">Kỹ năng</h2>
                                        <div class="flex flex-wrap gap-3">
                                            ${(mentor.skills && mentor.skills.length ? mentor.skills : ['Chưa có kỹ năng']).map(s => `<span class="inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-900">${s}</span>`).join('')}
                                        </div>
                                    </div>
                                    <div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
                                        <h2 class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-700 mb-4">Thông tin thêm</h2>
                                        <ul class="space-y-3 text-sm text-slate-900">
                                            <li><span class="font-semibold text-slate-900">MSSV:</span> ${mentor.mssv || 'Chưa cập nhật'}</li>
                                            <li><span class="font-semibold text-slate-900">Khoa:</span> ${mentor.khoa || 'Chưa chọn'}</li>
                                            <li><span class="font-semibold text-slate-900">Ngôn ngữ:</span> ${mentor.lang || 'Chưa cập nhật'}</li>
                                            <li><span class="font-semibold text-slate-900">Email:</span> ${mentor.email || 'Chưa cập nhật'}</li>
                                        </ul>
                                    </div>
                                </div>

                                <div class="mt-10 rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
                                    <h2 class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-700 mb-4">Minh chứng chứng chỉ</h2>
                                    <div class="flex justify-center">
                                        ${mentor.certificate ? `<img src="${mentor.certificate}" class="max-w-lg h-auto object-contain rounded-3xl border border-slate-200">` : `<div class="rounded-3xl border border-dashed border-slate-300 bg-slate-50 p-6 text-center text-sm text-slate-500">Chưa có ảnh chứng chỉ</div>`}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('profile-content').innerHTML = `<p class="p-20 text-center text-red-500">Hồ sơ không tồn tại hoặc đã bị xóa.</p>`;
                }
            }).catch(err => {
                console.error('Lỗi Firebase:', err);
                document.getElementById('profile-content').innerHTML = `<p class="p-20 text-center text-red-500">Lỗi tải dữ liệu từ Firebase!</p>`;
            });
        }

        window.onload = fetchProfile;
    </script>
</body>
</html>
